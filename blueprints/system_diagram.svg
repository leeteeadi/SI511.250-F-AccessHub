<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="60" y="70" font-size="34" font-family="Arial" font-weight="700" fill="#0f172a">AccessHub Edge System Architecture</text>

  <rect x="70" y="160" rx="18" ry="18" width="240" height="130" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="120" y="205" font-size="28" font-family="Arial" font-weight="700" fill="#1e3a8a">Frontend</text>
  <text x="112" y="240" font-size="20" font-family="Arial" fill="#1e3a8a">React Dashboard</text>
  <text x="97" y="268" font-size="20" font-family="Arial" fill="#1e3a8a">Request / Approve UI</text>

  <rect x="390" y="140" rx="18" ry="18" width="320" height="170" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="484" y="190" font-size="28" font-family="Arial" font-weight="700" fill="#14532d">Backend</text>
  <text x="450" y="225" font-size="20" font-family="Arial" fill="#14532d">Node + Express + Socket.IO</text>
  <text x="443" y="253" font-size="20" font-family="Arial" fill="#14532d">Approve / Deny + Audit Log</text>
  <text x="470" y="281" font-size="20" font-family="Arial" fill="#14532d">Publishes unlock event</text>

  <rect x="800" y="160" rx="18" ry="18" width="250" height="130" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="865" y="205" font-size="28" font-family="Arial" font-weight="700" fill="#92400e">MQTT</text>
  <text x="848" y="240" font-size="20" font-family="Arial" fill="#92400e">Broker / Command Bus</text>
  <text x="854" y="268" font-size="20" font-family="Arial" fill="#92400e">unlock / status / event</text>

  <rect x="770" y="420" rx="18" ry="18" width="320" height="180" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="835" y="470" font-size="28" font-family="Arial" font-weight="700" fill="#7f1d1d">AccessHub Edge</text>
  <text x="835" y="505" font-size="20" font-family="Arial" fill="#7f1d1d">ESP32 Controller</text>
  <text x="820" y="535" font-size="20" font-family="Arial" fill="#7f1d1d">LEDs + Buzzer + Button</text>
  <text x="835" y="565" font-size="20" font-family="Arial" fill="#7f1d1d">Servo Mock Lock</text>

  <rect x="120" y="430" rx="18" ry="18" width="250" height="130" fill="#e9d5ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="167" y="475" font-size="28" font-family="Arial" font-weight="700" fill="#581c87">User Flow</text>
  <text x="152" y="510" font-size="20" font-family="Arial" fill="#581c87">Guest requests access</text>
  <text x="160" y="538" font-size="20" font-family="Arial" fill="#581c87">Manager approves access</text>

  <line x1="310" y1="225" x2="390" y2="225" stroke="#475569" stroke-width="4"/>
  <polygon points="390,225 375,217 375,233" fill="#475569"/>
  <text x="325" y="205" font-size="18" font-family="Arial" fill="#334155">REST + WebSocket</text>

  <line x1="710" y1="225" x2="800" y2="225" stroke="#475569" stroke-width="4"/>
  <polygon points="800,225 785,217 785,233" fill="#475569"/>
  <text x="734" y="205" font-size="18" font-family="Arial" fill="#334155">MQTT publish</text>

  <line x1="925" y1="290" x2="925" y2="420" stroke="#475569" stroke-width="4"/>
  <polygon points="925,420 917,405 933,405" fill="#475569"/>
  <text x="945" y="355" font-size="18" font-family="Arial" fill="#334155">unlock command</text>

  <line x1="770" y1="510" x2="710" y2="510" stroke="#475569" stroke-width="4"/>
  <line x1="710" y1="510" x2="710" y2="310" stroke="#475569" stroke-width="4"/>
  <polygon points="710,310 702,325 718,325" fill="#475569"/>
  <text x="520" y="500" font-size="18" font-family="Arial" fill="#334155">status + events back to backend</text>

  <line x1="370" y1="495" x2="470" y2="310" stroke="#475569" stroke-width="4"/>
  <polygon points="470,310 454,318 468,328" fill="#475569"/>
  <text x="320" y="410" font-size="18" font-family="Arial" fill="#334155">request / approve flow</text>

  <text x="65" y="645" font-size="18" font-family="Arial" fill="#334155">Demo sequence: Request access → Approve in dashboard → Backend sends unlock → ESP32 actuates servo + LEDs → Event returns to UI</text>
</svg>
