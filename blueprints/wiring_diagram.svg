<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <rect width="1200" height="820" fill="#f8fafc"/>
  <text x="60" y="70" font-size="34" font-family="Arial" font-weight="700" fill="#0f172a">AccessHub Edge Wiring Diagram</text>

  <rect x="80" y="150" rx="22" ry="22" width="320" height="470" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="165" y="195" font-size="30" font-family="Arial" font-weight="700" fill="#0c4a6e">ESP32 DevKit</text>

  <g font-family="Arial" font-size="22" fill="#0c4a6e">
    <text x="120" y="255">GPIO23</text>
    <text x="120" y="310">GPIO22</text>
    <text x="120" y="365">GPIO21</text>
    <text x="120" y="420">GPIO19</text>
    <text x="120" y="475">GPIO18</text>
    <text x="120" y="530">GPIO17</text>
    <text x="120" y="585">GPIO16</text>
    <text x="120" y="640">5V / GND</text>
  </g>

  <rect x="790" y="190" rx="16" ry="16" width="250" height="90" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="875" y="245" font-size="28" font-family="Arial" font-weight="700" fill="#7f1d1d">Servo</text>

  <circle cx="850" cy="330" r="18" fill="#22c55e" stroke="#166534" stroke-width="3"/>
  <text x="880" y="338" font-size="22" font-family="Arial" fill="#14532d">Green LED</text>

  <circle cx="850" cy="395" r="18" fill="#ef4444" stroke="#991b1b" stroke-width="3"/>
  <text x="880" y="403" font-size="22" font-family="Arial" fill="#7f1d1d">Red LED</text>

  <circle cx="850" cy="460" r="18" fill="#eab308" stroke="#a16207" stroke-width="3"/>
  <text x="880" y="468" font-size="22" font-family="Arial" fill="#854d0e">Yellow LED</text>

  <rect x="790" y="520" rx="14" ry="14" width="240" height="55" fill="#f3f4f6" stroke="#4b5563" stroke-width="3"/>
  <text x="870" y="555" font-size="24" font-family="Arial" fill="#111827">Buzzer</text>

  <rect x="790" y="610" rx="14" ry="14" width="240" height="55" fill="#fef9c3" stroke="#ca8a04" stroke-width="3"/>
  <text x="867" y="645" font-size="24" font-family="Arial" fill="#854d0e">Push Button</text>

  <rect x="790" y="700" rx="14" ry="14" width="260" height="55" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="848" y="735" font-size="24" font-family="Arial" fill="#581c87">Door Sensor</text>

  <line x1="300" y1="245" x2="790" y2="235" stroke="#475569" stroke-width="4"/>
  <text x="490" y="220" font-size="20" font-family="Arial" fill="#334155">GPIO23 → Servo signal</text>

  <line x1="300" y1="300" x2="832" y2="330" stroke="#475569" stroke-width="4"/>
  <text x="505" y="300" font-size="20" font-family="Arial" fill="#334155">GPIO22 → Green LED</text>

  <line x1="300" y1="355" x2="832" y2="395" stroke="#475569" stroke-width="4"/>
  <text x="525" y="355" font-size="20" font-family="Arial" fill="#334155">GPIO21 → Red LED</text>

  <line x1="300" y1="410" x2="832" y2="460" stroke="#475569" stroke-width="4"/>
  <text x="505" y="412" font-size="20" font-family="Arial" fill="#334155">GPIO19 → Yellow LED</text>

  <line x1="300" y1="465" x2="790" y2="547" stroke="#475569" stroke-width="4"/>
  <text x="515" y="482" font-size="20" font-family="Arial" fill="#334155">GPIO18 → Buzzer +</text>

  <line x1="300" y1="520" x2="790" y2="637" stroke="#475569" stroke-width="4"/>
  <text x="510" y="545" font-size="20" font-family="Arial" fill="#334155">GPIO17 → Button (INPUT_PULLUP)</text>

  <line x1="300" y1="575" x2="790" y2="727" stroke="#475569" stroke-width="4"/>
  <text x="507" y="605" font-size="20" font-family="Arial" fill="#334155">GPIO16 → Door sensor</text>

  <line x1="300" y1="630" x2="790" y2="250" stroke="#16a34a" stroke-width="4"/>
  <text x="485" y="665" font-size="20" font-family="Arial" fill="#166534">5V → Servo VCC</text>

  <line x1="300" y1="650" x2="1040" y2="755" stroke="#111827" stroke-width="4" stroke-dasharray="10,8"/>
  <text x="470" y="705" font-size="20" font-family="Arial" fill="#111827">Common GND to all components</text>

  <text x="60" y="790" font-size="18" font-family="Arial" fill="#334155">Use a separate 5V source for the servo if needed. Keep ESP32 GND and servo GND tied together.</text>
</svg>
